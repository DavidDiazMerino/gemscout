server {
    listen 8080;
    root /usr/share/nginx/html;
    index index.html;

    # SSE streaming endpoints — disable buffering so events flush immediately
    location /api/agent/scout/stream {
        proxy_pass https://gemscout-backend-377689698254.europe-west3.run.app/agent/scout/stream;
        proxy_ssl_server_name on;
        proxy_set_header Host gemscout-backend-377689698254.europe-west3.run.app;
        proxy_set_header X-Real-IP $remote_addr;

        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        chunked_transfer_encoding on;
    }

    location /api/agent/scout/similar/stream {
        proxy_pass https://gemscout-backend-377689698254.europe-west3.run.app/agent/scout/similar/stream;
        proxy_ssl_server_name on;
        proxy_set_header Host gemscout-backend-377689698254.europe-west3.run.app;
        proxy_set_header X-Real-IP $remote_addr;

        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        chunked_transfer_encoding on;
    }

    # Proxy /api/* → FastAPI backend on Cloud Run
    location /api/ {
        proxy_pass https://gemscout-backend-377689698254.europe-west3.run.app/;
        proxy_ssl_server_name on;
        proxy_set_header Host gemscout-backend-377689698254.europe-west3.run.app;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
    }

    # SPA fallback — all other routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
