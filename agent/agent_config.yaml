# GemScout — Google Cloud Agent Builder configuration
# Deploy via: gcloud agent-builder agents create (or via Vertex AI Console)

displayName: "GemScout — Football Scouting Agent"
description: |
  GemScout is a World Cup 2026 scouting agent that finds hidden gems
  among 2,200+ players using semantic search and tactical analysis.
  Built for the Google Cloud Rapid Agent Hackathon 2026.

defaultLanguageCode: en

# Gemini model — Flash for speed, Pro for deeper analysis
model: gemini-2.0-flash-001

# System instruction — the agent's persona and behaviour
systemInstruction: |
  You are GemScout, an elite AI football scout preparing national team directors
  for the 2026 FIFA World Cup. You have access to a database of 2,200+ players
  from leagues worldwide, analyzed using advanced tactical metrics.

  Your mission: find the hidden gems — players in the 90th+ percentile for key
  metrics who are flying under the radar in non-European leagues like Brasileirão,
  Liga MX, and MLS.

  When a scouting director asks you to find players:
  1. ALWAYS use the scout_players tool first to get semantic + statistical matches
  2. Read the scouting report generated by the tool carefully
  3. Add your own tactical commentary and World Cup context
  4. Be specific: name the metrics that make each player stand out
  5. Mention the market value opportunity (pre-World Cup vs post-World Cup)

  You are direct, authoritative, and passionate about the beautiful game.
  You speak in the language of football tactics, not data science.

  Example queries you handle:
  - "Find me a pressing forward, under 24, from Americas leagues"
  - "Who's the best box-to-box midfielder in non-European leagues right now?"
  - "I need an attacking fullback with World Cup potential, under 26"

tools:
  - type: openapi
    displayName: "GemScout Player Scout"
    spec:
      # This points to your deployed FastAPI backend
      # Replace with your Cloud Run URL after deployment
      servers:
        - url: "https://gemscout-backend-HASH-uc.a.run.app"
      openapi: "3.0.0"
      info:
        title: "GemScout Scout Tool"
        version: "0.1.0"
      paths:
        /agent/scout:
          post:
            operationId: scout_players
            summary: >
              Find football players matching a natural language scouting request.
              Uses MongoDB Atlas Vector Search (Voyage AI embeddings) + Gemini.
            requestBody:
              required: true
              content:
                application/json:
                  schema:
                    type: object
                    required: [query]
                    properties:
                      query:
                        type: string
                        description: Natural language player profile description
                        example: "pressing forward, under 24, from Americas leagues, World Cup potential"
                      position:
                        type: string
                        enum: [FWD, MID, DEF, GK]
                        description: Filter by position
                      max_age:
                        type: integer
                        description: Maximum player age
                        example: 24
                      min_age:
                        type: integer
                        description: Minimum player age
                      league_tier_max:
                        type: integer
                        description: "1=Big5Europe, 2=MidEurope, 3=Americas/Other"
                        example: 3
                      world_cup_context:
                        type: boolean
                        default: true
                      limit:
                        type: integer
                        default: 5
                        maximum: 10
            responses:
              "200":
                description: Scouting results with reasoning steps and Gemini report
                content:
                  application/json:
                    schema:
                      type: object
                      properties:
                        query:
                          type: string
                        reasoning_steps:
                          type: array
                          items:
                            type: object
                        players:
                          type: array
                        scouting_report:
                          type: string
                          description: Gemini-generated detailed scouting dossier
                        tool_calls:
                          type: array
                          items:
                            type: string
